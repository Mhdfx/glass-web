services:
  app:
    build: .
    image: chaimae-glass:latest
    container_name: chaimae-glass
    restart: unless-stopped
    env_file:
      - .env
    ports:
      # Exposé uniquement en local — Nginx (hors conteneur) fait le reverse proxy
      - "127.0.0.1:3000:3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
