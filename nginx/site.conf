# Reverse proxy Nginx — chaimae-glass
# À placer dans /etc/nginx/sites-available/ puis symlink vers sites-enabled/.
# Remplacer VOTRE-DOMAINE.ma par le domaine réel avant `certbot --nginx`.

upstream chaimae_glass_app {
    # max_fails/fail_timeout : détection rapide d'un backend mort
    server 127.0.0.1:3000 max_fails=3 fail_timeout=10s;
}

# Redirection HTTP → HTTPS (certbot complètera ce bloc)
server {
    listen 80;
    listen [::]:80;
    server_name VOTRE-DOMAINE.ma www.VOTRE-DOMAINE.ma;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name VOTRE-DOMAINE.ma www.VOTRE-DOMAINE.ma;

    # Certificats Let's Encrypt (générés par certbot)
    ssl_certificate     /etc/letsencrypt/live/VOTRE-DOMAINE.ma/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/VOTRE-DOMAINE.ma/privkey.pem;

    # Sécurité de base
    server_tokens off;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # Compression
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Page de maintenance servie si l'app est injoignable — jamais de 502 nue
    error_page 502 503 504 @maintenance;

    location @maintenance {
        root /var/www/maintenance;
        rewrite ^ /index.html break;
    }

    # Assets Next.js immuables — cache long
    location /_next/static/ {
        proxy_pass http://chaimae_glass_app;
        proxy_cache_valid 200 30d;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
        proxy_pass http://chaimae_glass_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
        proxy_next_upstream error timeout;
        proxy_intercept_errors on;
    }
}
