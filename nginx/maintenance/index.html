<!DOCTYPE html>
<html lang="fr">
<head>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

      min-height: 100dvh;

      align-items: center;
      justify-content: center;
      background: #0B0A08;

      font-family: "Segoe UI", system-ui, -apple-system, sans-serif;

      background: rgba(201,166,107,0.35);
    }
    h1 {
      font-family: Georgia, "Times New Roman", serif;
      font-weight: 500;
      font-size: 1.6rem;
      line-height: 1.3;
    }
    p { margin-top: 14px; font-size: 0.95rem; line-height: 1.6; color: #a89f8d; }
    a.wa {
      display: inline-block;
      margin-top: 28px;
      padding: 13px 28px;
      border-radius: 999px;
      background: #25D366;
      color: #0B0A08;
      font-weight: 600;
      font-size: 0.9rem;
      text-decoration: none;
    }
    a.wa:hover { filter: brightness(1.08); }

</head>

</html>
